<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARIOM YADAV | ROOT</title>
    <style>
        /* Based on your common.css & index.css but upgraded for Full Screen */
        :root {
            --color-bg: #0d0208;
            --color-fg: #00ff41; /* Hacker Green */
            --color-link: #ff3366;
            --spacing-md: 20px;
            --spacing-lg: 40px;
            --font-family: 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--color-bg);
            color: var(--color-fg);
            font-family: var(--font-family);
            line-height: 1.6;
            padding: var(--spacing-md);
        }

        /* Scanline CRT Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 100;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Top Section: Identity */
        header {
            max-width: 800px;
            margin: 40px 0;
        }

        h1 { font-size: 3rem; letter-spacing: -2px; text-transform: uppercase; }
        
        .intro-text { 
            font-size: 1.2rem; 
            margin: 10px 0;
            border-right: 2px solid var(--color-fg);
            display: inline-block;
            padding-right: 5px;
        }

        .contacts { margin: 20px 0; }
        .contacts a { 
            color: var(--color-link); 
            text-decoration: none; 
            margin-right: 20px; 
            font-weight: bold;
            border: 1px solid var(--color-link);
            padding: 4px 10px;
        }
        .contacts a:hover { background: var(--color-link); color: white; }

        /* Navigation / Sidebar-style line */
        nav {
            border-top: 1px solid var(--color-fg);
            border-bottom: 1px solid var(--color-fg);
            padding: 10px 0;
            margin: 40px 0;
            display: flex;
            gap: 30px;
        }
        nav a { color: var(--color-fg); text-decoration: none; text-transform: uppercase; font-size: 0.9rem; }
        nav a:hover { text-decoration: underline; }

        /* Project Section - USES WHOLE SCREEN */
        .section-title { 
            font-size: 1.5rem; 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--color-fg); margin-left: 20px; opacity: 0.3; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); /* Large cards */
            gap: 30px;
            width: 100%;
        }

        .project-card {
            border: 1px solid #222;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            transition: 0.3s;
        }
        .project-card:hover { border-color: var(--color-fg); background: rgba(0, 255, 65, 0.05); }

        .media-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .media-box iframe, .media-box img { width: 100%; height: 100%; border: none; object-fit: cover; }

        .project-info h3 { margin-bottom: 10px; color: #fff; }
        .project-info p { font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
        
        .btn-run {
            color: var(--color-fg);
            border: 1px solid var(--color-fg);
            padding: 5px 15px;
            text-decoration: none;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .project-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>HARIOM YADAV</h1>
        <div class="intro-text">
            > I Like To Build 
        </div>
        
        <div class="contacts">
            <a href="mailto:hariomyadavji1112@gmail.com">GMAIL</a>
            <a href="https://x.com/HariomCodes">X</a>
            <a href="https://github.com/hariomyadav-git">GITHUB</a>
        </div>
    </header>

    <nav>
        <a href="#projects">// PROJECTS</a>
        <a href="#">// BLOGS</a>
        <a href="#">// ARCHIVE</a>
        
    </nav>

    <h2 class="section-title">DEPLOYED_OPERATIONS</h2>
    
    <section id="project-list" class="project-grid">
        </section>
</div>

<script>
    /* EASY UPDATE SECTION 
       To add a project: 
       1. For YouTube: type is 'video', link is the 'embed' URL.
       2. For Image: type is 'image', link is your photo path.
    */
    const myProjects = [
        {
            title: "Multiplayer Snake Game",
            desc: "Physics-based snake game built in Python. Features dual-control logic.",
            type: "video", 
            mediaLink: "https://www.youtube.com/embed/dQw4w9WgXcQ", // Example YT link
            projectURL: "#"
        },
        {
            title: "Data Visualization Map",
            desc: "Visualizing global datasets using Matplotlib and GeoPandas.",
            type: "image",
            mediaLink: "https://via.placeholder.com/800x450/003300/00ff41?text=Data+Map+Preview",
            projectURL: "#"
        },
        {
            title: "NewPipe Structural Clone",
            desc: "An open-source approach to lightweight media streaming.",
            type: "image",
            mediaLink: "https://via.placeholder.com/800x450/111/00ff41?text=Open+Source+UI",
            projectURL: "#"
        }
    ];

    const list = document.getElementById('project-list');

    myProjects.forEach(proj => {
        let mediaHtml = proj.type === 'video' 
            ? `<iframe src="${proj.mediaLink}" allowfullscreen></iframe>`
            : `<img src="${proj.mediaLink}" alt="Thumbnail">`;

        list.innerHTML += `
            <div class="project-card">
                <div class="media-box">${mediaHtml}</div>
                <div class="project-info">
                    <h3>${proj.title}</h3>
                    <p>${proj.desc}</p>
                    <a href="${proj.projectURL}" class="btn-run">Source_Code()</a>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
